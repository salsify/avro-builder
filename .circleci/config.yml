version: 2.1
jobs:
  lint:
    docker:
      - image: cimg/ruby:3.3.10
    working_directory: ~/avro-builder
    steps:
      - checkout
      - restore_cache:
          keys:
            - v2-gems-ruby-3.3.10-{{ checksum "avro-builder.gemspec" }}-{{ checksum "Gemfile" }}
            - v2-gems-ruby-3.3.10-
      - run:
          name: Install Gems
          command: |
            bundle config set path 'vendor/bundle'
            if ! bundle check; then
              bundle install --jobs=4 --retry=3
              bundle clean
            fi
      - save_cache:
          key: v2-gems-ruby-3.3.10-{{ checksum "avro-builder.gemspec" }}-{{ checksum "Gemfile" }}
          paths:
            - "vendor/bundle"
            - "gemfiles/vendor/bundle"
      - run:
          name: Run Rubocop
          command: bundle exec rubocop
  test:
    parameters:
      gemfile:
        type: string
      ruby-version:
        type: string
    docker:
      - image: cimg/ruby:<< parameters.ruby-version >>
    environment:
      CIRCLE_TEST_REPORTS: "test-results"
      BUNDLE_GEMFILE: << parameters.gemfile >>
    working_directory: ~/avro-builder
    steps:
      - checkout
      - restore_cache:
          keys:
            - v2-gems-ruby-<< parameters.ruby-version >>-{{ checksum "avro-builder.gemspec" }}-{{ checksum "<< parameters.gemfile >>" }}
            - v2-gems-ruby-<< parameters.ruby-version >>-
      - run:
          name: Install Gems
          command: |
            bundle config set path 'vendor/bundle'
            if ! bundle check; then
              bundle install --jobs=4 --retry=3
              bundle clean
            fi
      - save_cache:
          key: v2-gems-ruby-<< parameters.ruby-version >>-{{ checksum "avro-builder.gemspec" }}-{{ checksum "<< parameters.gemfile >>" }}
          paths:
            - "vendor/bundle"
            - "gemfiles/vendor/bundle"
      - run:
          name: Run Tests
          command: |
            bundle exec rspec --format RspecJunitFormatter --out $CIRCLE_TEST_REPORTS/rspec/junit.xml --format progress spec
      - store_test_results:
          path: "test-results"
workflows:
  build:
    jobs:
      - lint
      - test:
          matrix:
            parameters:
              gemfile:
                - gemfiles/avro_1.11.gemfile
                - gemfiles/avro_1.12.gemfile
              ruby-version:
                - 3.3.10
                - 3.4.8
                - 4.0.1
